<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Live Crisis Map — SahayaSetu</title>
  <meta name="description" content="Real-time crisis and volunteer tracking map across India. SahayaSetu NGO."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root{
      --primary:#E85D04;--primary-dk:#C44B00;--yellow:#FFBA08;
      --teal:#2EC4B6;--navy:#0D1B2A;--navy-lt:#162435;
      --dark:#1A1A2E;--gray:#6B7280;--red:#EF4444;--green:#22C55E;
      --shadow:0 4px 24px rgba(0,0,0,.18);--radius:12px;
      --transition:all .25s cubic-bezier(.4,0,.2,1);
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;font-family:'Inter',sans-serif;}
    body{background:var(--navy);color:#fff;display:flex;flex-direction:column;overflow:hidden;}
    a{text-decoration:none;color:inherit;}
    ::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:2px;}

    /* ── TOPNAV ── */
    .topnav{background:var(--navy-lt);border-bottom:1px solid rgba(255,255,255,.06);padding:12px 24px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;z-index:200;position:relative;}
    .nav-brand{display:flex;align-items:center;gap:10px;}
    .brand-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--primary),var(--yellow));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;}
    .brand-name{font-family:'Playfair Display',serif;font-size:18px;font-weight:800;}
    .brand-name span{color:var(--primary);}
    .brand-sub{font-size:11px;color:rgba(255,255,255,.4);margin-left:4px;}
    .nav-pills{display:flex;gap:6px;}
    .pill{padding:7px 16px;border-radius:50px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:var(--transition);}
    .pill.active{background:var(--primary);color:#fff;}
    .pill:not(.active){background:rgba(255,255,255,.07);color:rgba(255,255,255,.7);}
    .pill:not(.active):hover{background:rgba(255,255,255,.14);color:#fff;}
    .nav-right{display:flex;align-items:center;gap:10px;}
    .nav-link{padding:7px 16px;border-radius:50px;background:rgba(255,255,255,.07);color:rgba(255,255,255,.8);font-size:12px;font-weight:600;transition:var(--transition);}
    .nav-link:hover{background:rgba(255,255,255,.14);color:#fff;}
    .sos-btn{padding:8px 18px;border-radius:50px;background:var(--red);color:#fff;font-size:13px;font-weight:700;border:none;cursor:pointer;font-family:inherit;animation:pulse-r 2s infinite;}
    @keyframes pulse-r{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.5);}50%{box-shadow:0 0 0 8px rgba(239,68,68,0);}}

    /* ── LAYOUT ── */
    .map-body{display:flex;flex:1;overflow:hidden;min-height:0;}

    /* ── SIDEBAR ── */
    .sidebar{width:280px;background:var(--navy-lt);border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
    .sb-head{padding:16px 18px 10px;border-bottom:1px solid rgba(255,255,255,.06);}
    .sb-title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;}
    .live-dot{width:8px;height:8px;background:var(--red);border-radius:50%;animation:pulse-r 1.5s infinite;display:inline-block;}
    .sb-sub{font-size:10px;color:rgba(255,255,255,.35);margin-top:2px;}
    .filter-row{padding:10px 14px;display:flex;gap:5px;flex-wrap:wrap;border-bottom:1px solid rgba(255,255,255,.05);}
    .fchip{padding:4px 11px;border-radius:50px;font-size:11px;font-weight:600;border:1.5px solid rgba(255,255,255,.1);color:rgba(255,255,255,.55);cursor:pointer;transition:var(--transition);background:none;font-family:inherit;}
    .fchip.active{background:var(--primary);border-color:var(--primary);color:#fff;}
    .fchip:hover:not(.active){border-color:rgba(255,255,255,.3);color:#fff;}
    .inc-list{flex:1;overflow-y:auto;padding:8px;}
    .inc-card{background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.07);border-radius:10px;padding:13px;margin-bottom:7px;cursor:pointer;transition:var(--transition);}
    .inc-card:hover{background:rgba(255,255,255,.08);border-color:rgba(232,93,4,.5);}
    .inc-card.sel{background:rgba(232,93,4,.12);border-color:var(--primary);}
    .inc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:7px;}
    .inc-title{font-size:12px;font-weight:700;color:#fff;line-height:1.35;flex:1;}
    .sev-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:3px;}
    .s-critical{background:#EF4444;box-shadow:0 0 6px #EF4444;}
    .s-high{background:#F59E0B;box-shadow:0 0 6px #F59E0B;}
    .s-medium{background:#2EC4B6;box-shadow:0 0 6px #2EC4B6;}
    .s-low{background:#22C55E;box-shadow:0 0 6px #22C55E;}
    .inc-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:7px;}
    .t{font-size:9px;padding:2px 8px;border-radius:50px;font-weight:700;}
    .t-flood{background:rgba(59,130,246,.2);color:#93C5FD;}
    .t-medical{background:rgba(239,68,68,.2);color:#FCA5A5;}
    .t-food{background:rgba(245,158,11,.2);color:#FCD34D;}
    .t-shelter{background:rgba(46,196,182,.2);color:#5EEAD4;}
    .t-fire{background:rgba(239,100,30,.2);color:#FCA061;}
    .t-infra{background:rgba(139,92,246,.2);color:#C4B5FD;}
    .t-vol{background:rgba(34,197,94,.2);color:#86EFAC;}
    .t-depot{background:rgba(255,186,8,.2);color:#FDE68A;}
    .inc-meta{font-size:10px;color:rgba(255,255,255,.4);display:flex;gap:10px;}
    .sb-stats{padding:14px 16px;border-top:1px solid rgba(255,255,255,.06);display:grid;grid-template-columns:1fr 1fr;gap:8px;flex-shrink:0;}
    .ss{background:rgba(255,255,255,.04);border-radius:10px;padding:10px;text-align:center;}
    .ss-n{font-family:'Playfair Display',serif;font-size:20px;font-weight:800;}
    .ss-l{font-size:9px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}

    /* ── MAP ── */
    .map-wrap{flex:1;position:relative;}
    #map{width:100%;height:100%;}

    /* SEARCH BAR */
    .map-search{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:500;display:flex;gap:8px;align-items:center;}
    .search-box{background:rgba(13,27,42,.92);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.15);border-radius:50px;padding:10px 20px;display:flex;align-items:center;gap:10px;min-width:340px;box-shadow:var(--shadow);}
    .search-box input{background:none;border:none;outline:none;color:#fff;font-size:14px;font-family:inherit;width:100%;}
    .search-box input::placeholder{color:rgba(255,255,255,.35);}
    .search-icon{font-size:15px;color:rgba(255,255,255,.35);}

    /* MAP CONTROLS */
    .map-ctrl{position:absolute;right:16px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:6px;z-index:400;}
    .ctrl-btn{width:38px;height:38px;background:rgba(13,27,42,.92);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.12);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:rgba(255,255,255,.8);transition:var(--transition);}
    .ctrl-btn:hover{background:rgba(232,93,4,.3);border-color:var(--primary);color:#fff;}

    /* LEGEND */
    .legend{position:absolute;bottom:16px;right:16px;z-index:400;background:rgba(13,27,42,.92);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:14px 18px;min-width:190px;}
    .leg-title{font-size:11px;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
    .leg-item{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px;color:rgba(255,255,255,.75);}
    .leg-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}

    /* POPUP */
    .leaflet-popup-content-wrapper{background:var(--navy-lt)!important;border:1px solid rgba(255,255,255,.1)!important;border-radius:12px!important;color:#fff!important;box-shadow:var(--shadow)!important;padding:0!important;}
    .leaflet-popup-content{margin:0!important;min-width:220px;}
    .leaflet-popup-tip{background:var(--navy-lt)!important;}
    .leaflet-popup-close-button{color:rgba(255,255,255,.5)!important;top:10px!important;right:10px!important;}

    /* TOAST */
    .toast{position:fixed;top:80px;right:20px;z-index:9999;background:var(--green);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;transform:translateX(110%);transition:transform .4s;box-shadow:var(--shadow);}
    .toast.show{transform:translateX(0);}
    .toast.warn{background:var(--primary);}
    .toast.danger{background:var(--red);}

    @media(max-width:800px){.sidebar{display:none;}}
  </style>
</head>
<body>

<!-- TOPNAV -->
<nav class="topnav">
  <div class="nav-brand">
    <div class="brand-icon">🌿</div>
    <div>
      <div class="brand-name">Sahaya<span>Setu</span> <span class="brand-sub">· Live Map</span></div>
    </div>
  </div>
  <div class="nav-pills">
    <button class="pill active" onclick="filterMarkers('all',this)">All Incidents</button>
    <button class="pill" onclick="filterMarkers('critical',this)">🔴 Critical</button>
    <button class="pill" onclick="filterMarkers('volunteer',this)">🟢 Volunteers</button>
    <button class="pill" onclick="filterMarkers('depot',this)">🟡 Depots</button>
  </div>
  <div class="nav-right">
    <a href="index.html" class="nav-link">← Home</a>
    <a href="dashboard.html" class="nav-link">Dashboard</a>
    <button class="sos-btn" onclick="triggerSOS()">🆘 SOS</button>
  </div>
</nav>

<!-- BODY -->
<div class="map-body">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sb-head">
      <div class="sb-title"><span class="live-dot"></span> Live Incidents</div>
      <div class="sb-sub" id="sb-sub">Loading...</div>
    </div>
    <div class="filter-row">
      <button class="fchip active" onclick="filterSide('all',this)">All</button>
      <button class="fchip" onclick="filterSide('flood',this)">🌊 Flood</button>
      <button class="fchip" onclick="filterSide('medical',this)">🏥 Medical</button>
      <button class="fchip" onclick="filterSide('food',this)">🍱 Food</button>
      <button class="fchip" onclick="filterSide('shelter',this)">🏠 Shelter</button>
    </div>
    <div class="inc-list" id="inc-list"></div>
    <div class="sb-stats">
      <div class="ss"><div class="ss-n" style="color:#EF4444" id="s-critical">0</div><div class="ss-l">Critical</div></div>
      <div class="ss"><div class="ss-n" style="color:#22C55E" id="s-vol">0</div><div class="ss-l">On Ground</div></div>
      <div class="ss"><div class="ss-n" style="color:#FFBA08" id="s-depot">0</div><div class="ss-l">Depots</div></div>
      <div class="ss"><div class="ss-n" style="color:#2EC4B6" id="s-res">0</div><div class="ss-l">Resolved Today</div></div>
    </div>
  </aside>

  <!-- MAP -->
  <div class="map-wrap">
    <div class="map-search">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input id="search-input" type="text" placeholder="Search city or incident..." oninput="searchMap(this.value)"/>
      </div>
    </div>

    <div id="map"></div>

    <!-- MAP CONTROLS -->
    <div class="map-ctrl">
      <div class="ctrl-btn" onclick="map.zoomIn()" title="Zoom In">＋</div>
      <div class="ctrl-btn" onclick="map.zoomOut()" title="Zoom Out">－</div>
      <div class="ctrl-btn" onclick="locateMe()" title="My Location">📍</div>
      <div class="ctrl-btn" onclick="map.setView([22.5,82.5],5)" title="Reset View">🗺️</div>
    </div>

    <!-- LEGEND -->
    <div class="legend">
      <div class="leg-title">Map Legend</div>
      <div class="leg-item"><div class="leg-dot" style="background:#EF4444;box-shadow:0 0 6px #EF4444"></div>Critical Crisis</div>
      <div class="leg-item"><div class="leg-dot" style="background:#F59E0B;box-shadow:0 0 6px #F59E0B"></div>High Priority</div>
      <div class="leg-item"><div class="leg-dot" style="background:#22C55E;box-shadow:0 0 6px #22C55E"></div>Volunteer</div>
      <div class="leg-item"><div class="leg-dot" style="background:#FFBA08;box-shadow:0 0 6px #FFBA08"></div>Resource Depot</div>
      <div class="leg-item"><div class="leg-dot" style="background:#3B82F6;box-shadow:0 0 6px #3B82F6"></div>Resolved</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script src="js/api.js"></script>
<script>
/* ── DATA ── */
let incidents = [];
let volunteers = [];
const depots = [
  { id:'D-01', type:'depot', title:'Zone A Depot — Bhopal',    city:'Bhopal',    state:'MP', lat:23.24, lng:77.39, food:840, med:210, blankets:420, water:150 },
  { id:'D-02', type:'depot', title:'Zone B Depot — Indore',    city:'Indore',    state:'MP', lat:22.71, lng:75.84, food:320, med:180, blankets:380, water:200 },
  { id:'D-03', type:'depot', title:'Zone C Depot — Jabalpur',  city:'Jabalpur',  state:'MP', lat:23.17, lng:79.96, food:48,  med:90,  blankets:32,  water:80,  low:true },
  { id:'D-04', type:'depot', title:'Zone D Depot — Nagpur',    city:'Nagpur',    state:'MH', lat:21.14, lng:79.07, food:560, med:145, blankets:290, water:120 },
];

/* ── MAP INIT ── */
const map = L.map('map', { zoomControl: false, attributionControl: true }).setView([22.5, 80.5], 5);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://openstreetmap.org">OpenStreetMap</a> contributors &copy; <a href="https://carto.com">CARTO</a>',
  maxZoom: 19
}).addTo(map);

/* ── CUSTOM ICONS ── */
function makeIcon(color, emoji, size=18) {
  return L.divIcon({
    className: '',
    iconSize: [size+8, size+8],
    iconAnchor: [(size+8)/2, (size+8)/2],
    popupAnchor: [0, -(size+8)/2],
    html: `<div style="
      width:${size+8}px;height:${size+8}px;border-radius:50%;
      background:${color};border:3px solid #fff;
      box-shadow:0 0 12px ${color},0 2px 8px rgba(0,0,0,.4);
      display:flex;align-items:center;justify-content:center;
      font-size:${size*0.65}px;cursor:pointer;transition:transform .2s;
    ">${emoji}</div>`
  });
}

const SEV_COLOR = { critical:'#EF4444', high:'#F59E0B', medium:'#2EC4B6', low:'#22C55E' };
const CAT_EMOJI = { flood:'🌊', medical:'🏥', food:'🍱', shelter:'🏠', fire:'🔥', earthquake:'🌍', other:'⚠️' };

/* ── MARKERS STORAGE ── */
const allMarkers = [];

function addIncidentMarker(inc) {
  const color = SEV_COLOR[inc.sev] || '#6B7280';
  const emoji = CAT_EMOJI[inc.cat] || '⚠️';
  const icon = makeIcon(color, emoji);
  const m = L.marker([inc.lat, inc.lng], { icon }).addTo(map);
  m.bindPopup(`
    <div style="padding:14px 16px;">
      <div style="font-size:10px;font-weight:700;color:${color};text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;">${inc.sev} · ${inc.cat}</div>
      <div style="font-size:14px;font-weight:800;color:#fff;margin-bottom:8px;line-height:1.3;">${inc.title}</div>
      <div style="font-size:12px;color:rgba(255,255,255,.6);line-height:1.5;margin-bottom:10px;">${inc.desc}</div>
      <div style="display:flex;gap:12px;font-size:11px;color:rgba(255,255,255,.5);margin-bottom:10px;">
        <span>👥 ${inc.people} affected</span>
        <span>🙋 ${inc.vols} volunteers</span>
        <span>🕐 ${inc.time}</span>
      </div>
      <div style="display:flex;gap:6px;">
        <button onclick="showToast('Assigning volunteers to ${inc.id}...','warn')" style="flex:1;padding:8px;border-radius:8px;background:var(--primary);color:#fff;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">Assign Volunteer</button>
        <button onclick="showToast('${inc.id} escalated to Level 2','danger')" style="padding:8px 12px;border-radius:8px;background:rgba(255,255,255,.1);color:#fff;border:none;font-size:12px;cursor:pointer;font-family:inherit;">Escalate</button>
      </div>
    </div>
  `);
  m.data = inc;
  m.on('click', () => selectCard(inc.id));
  allMarkers.push(m);
}

function addVolunteerMarker(vol) {
  const color = vol.status === 'deployed' ? '#E85D04' : '#22C55E';
  const icon = makeIcon(color, '🙋', 16);
  const m = L.marker([vol.lat, vol.lng], { icon }).addTo(map);
  m.bindPopup(`
    <div style="padding:14px 16px;">
      <div style="font-size:10px;font-weight:700;color:${color};text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;">VOLUNTEER · ${vol.status.toUpperCase()}</div>
      <div style="font-size:14px;font-weight:800;color:#fff;margin-bottom:6px;">${vol.title}</div>
      <div style="font-size:12px;color:rgba(255,255,255,.6);margin-bottom:10px;">📍 ${vol.city}, ${vol.state} · 🛠️ ${vol.skills}</div>
      <div style="font-size:12px;color:rgba(255,255,255,.5);margin-bottom:10px;">Active tasks: <strong style="color:#fff;">${vol.tasks}</strong></div>
      <button onclick="showToast('Contacting ${vol.title}... 📞','warn')" style="width:100%;padding:8px;border-radius:8px;background:${color};color:#fff;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">📞 Contact Volunteer</button>
    </div>
  `);
  m.data = { ...vol, type: 'volunteer' };
  allMarkers.push(m);
}

function addDepotMarker(dep) {
  const color = dep.low ? '#F59E0B' : '#FFBA08';
  const icon = makeIcon(color, '📦', 16);
  const m = L.marker([dep.lat, dep.lng], { icon }).addTo(map);
  m.bindPopup(`
    <div style="padding:14px 16px;">
      <div style="font-size:10px;font-weight:700;color:${color};text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;">RESOURCE DEPOT${dep.low?' · ⚠️ LOW STOCK':''}</div>
      <div style="font-size:14px;font-weight:800;color:#fff;margin-bottom:10px;">${dep.title}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;">
        <div style="background:rgba(255,255,255,.06);border-radius:6px;padding:8px;text-align:center;"><div style="font-size:16px;font-weight:800;color:#fff;">${dep.food}</div><div style="font-size:10px;color:rgba(255,255,255,.4);">Food Pkts</div></div>
        <div style="background:rgba(255,255,255,.06);border-radius:6px;padding:8px;text-align:center;"><div style="font-size:16px;font-weight:800;color:#fff;">${dep.med}</div><div style="font-size:10px;color:rgba(255,255,255,.4);">Med Kits</div></div>
        <div style="background:rgba(255,255,255,.06);border-radius:6px;padding:8px;text-align:center;"><div style="font-size:16px;font-weight:800;color:${dep.blankets < 50 ? '#EF4444':'#fff'};">${dep.blankets}</div><div style="font-size:10px;color:rgba(255,255,255,.4);">Blankets</div></div>
        <div style="background:rgba(255,255,255,.06);border-radius:6px;padding:8px;text-align:center;"><div style="font-size:16px;font-weight:800;color:#fff;">${dep.water}</div><div style="font-size:10px;color:rgba(255,255,255,.4);">Water Cans</div></div>
      </div>
      <button onclick="showToast('Dispatch request sent from ${dep.city} depot 🚚','warn')" style="width:100%;padding:8px;border-radius:8px;background:${color};color:#1A1A2E;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">🚚 Request Dispatch</button>
    </div>
  `);
  m.data = { ...dep, type: 'depot' };
  allMarkers.push(m);
}

/* ── RENDER ALL MARKERS ── */
function renderAllMarkers() {
  allMarkers.forEach(m => map.removeLayer(m));
  allMarkers.length = 0;
  incidents.forEach(addIncidentMarker);
  volunteers.forEach(addVolunteerMarker);
  depots.forEach(addDepotMarker);
}

/* ── SIDEBAR LIST ── */
function renderList(filter = 'all') {
  const list = document.getElementById('inc-list');
  const items = filter === 'all' ? incidents : incidents.filter(i => i.cat === filter);
  list.innerHTML = items.map(inc => {
    const color = SEV_COLOR[inc.sev];
    const emoji = CAT_EMOJI[inc.cat];
    return `
      <div class="inc-card" id="card-${inc.id}" onclick="flyTo(${inc.lat},${inc.lng},'${inc.id}')">
        <div class="inc-top">
          <div class="inc-title">${emoji} ${inc.title}</div>
          <div class="sev-dot s-${inc.sev}"></div>
        </div>
        <div class="inc-tags">
          <span class="t t-${inc.cat}">${inc.cat.toUpperCase()}</span>
          <span class="t t-${inc.cat}">${inc.sev.toUpperCase()}</span>
        </div>
        <div class="inc-meta">
          <span>📍 ${inc.city}</span>
          <span>👥 ${inc.people}</span>
          <span>🕐 ${inc.time}</span>
        </div>
      </div>`;
  }).join('');
  document.getElementById('sb-sub').textContent = `${items.length} incidents · ${volunteers.length} volunteers on ground`;
}

/* ── FILTER SIDEBAR ── */
function filterSide(cat, btn) {
  document.querySelectorAll('.fchip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderList(cat === 'all' ? 'all' : cat);
}

/* ── FILTER MARKERS ── */
function filterMarkers(type, btn) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  allMarkers.forEach(m => {
    const d = m.data;
    const show = type === 'all'
      || (type === 'critical'  && d.sev === 'critical')
      || (type === 'volunteer' && d.type === 'volunteer')
      || (type === 'depot'     && d.type === 'depot');
    show ? m.addTo(map) : map.removeLayer(m);
  });
}

/* ── FLY TO ── */
function flyTo(lat, lng, id) {
  map.flyTo([lat, lng], 11, { duration: 1.2 });
  selectCard(id);
  const m = allMarkers.find(m => m.data && m.data.id === id);
  if (m) setTimeout(() => m.openPopup(), 1300);
}

function selectCard(id) {
  document.querySelectorAll('.inc-card').forEach(c => c.classList.remove('sel'));
  const card = document.getElementById('card-' + id);
  if (card) { card.classList.add('sel'); card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
}

/* ── SEARCH ── */
function searchMap(q) {
  if (!q) return;
  const match = incidents.find(i => i.title.toLowerCase().includes(q.toLowerCase()) || i.city.toLowerCase().includes(q.toLowerCase()));
  if (match) flyTo(match.lat, match.lng, match.id);
}

/* ── LOCATE ME ── */
function locateMe() {
  if (!navigator.geolocation) { showToast('Geolocation not supported', 'danger'); return; }
  navigator.geolocation.getCurrentPosition(
    pos => { map.flyTo([pos.coords.latitude, pos.coords.longitude], 12); showToast('📍 Located you on the map!'); },
    () => showToast('Location access denied', 'warn')
  );
}

/* ── SOS ── */
async function triggerSOS() {
  if (confirm('🆘 Send SOS Emergency Alert?\n\nYour location will be broadcast to all coordinators and nearby volunteers immediately.')) {
    try {
      await window.SahayaSetu.SOSAPI.trigger('Emergency from map');
      showToast('🆘 SOS SENT! Coordinators alerted. Help is on the way.', 'danger');
      setTimeout(() => showToast('📞 Coordinator Ayesha calling you...', 'warn'), 2500);
    } catch(e) {
      showToast('❌ SOS failed to send!', 'error');
    }
  }
}

/* ── STATS ── */
function updateStats() {
  count('s-critical', incidents.filter(i => i.sev === 'critical').length);
  count('s-vol', volunteers.length + 43);
  count('s-depot', depots.length + 3);
  count('s-res', 34);
}

function count(id, val, dur=1200) {
  const el = document.getElementById(id); if(!el) return;
  let cur=0; const step=val/(dur/16);
  const t=setInterval(()=>{cur=Math.min(cur+step,val); el.textContent=Math.floor(cur); if(cur>=val)clearInterval(t);},16);
}

/* ── TOAST ── */
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  const ico = type==='danger'?'🆘':type==='warn'?'⚡':'✅';
  t.className = `toast ${type==='success'?'':type}`;
  t.innerHTML = `${ico} <span>${msg}</span>`;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 4000);
}

/* ── INIT ── */
window.addEventListener('load', async () => {
  try {
    const [repsRes, volsRes, invRes] = await Promise.all([
      window.SahayaSetu.ReportsAPI.getAll(),
      window.SahayaSetu.VolunteersAPI.getAll(),
      window.SahayaSetu.InventoryAPI.getAll()
    ]);
    
    if (repsRes && repsRes.reports) {
      incidents = repsRes.reports.map(r => ({
        id: r.reportId || r._id, _id: r._id, type: 'incident',
        cat: r.category, sev: r.severity, title: r.title,
        city: r.location?.city || '—', state: r.location?.state || '—',
        lat: r.location?.geo?.coordinates ? r.location.geo.coordinates[1] : (22.5 + (Math.random()-0.5)*2),
        lng: r.location?.geo?.coordinates ? r.location.geo.coordinates[0] : (80.5 + (Math.random()-0.5)*2),
        people: r.peopleAffected || 0,
        vols: r.assignedVolunteers ? r.assignedVolunteers.length : 0,
        desc: r.description || '',
        time: timeAgo(r.createdAt)
      }));
    }
    
    if (volsRes && volsRes.volunteers) {
      volunteers = volsRes.volunteers.map(v => ({
        id: v._id, type: 'volunteer', title: v.user?.name || 'Volunteer',
        city: v.location?.city || '—', state: v.location?.state || '—',
        lat: v.location?.coordinates ? v.location.coordinates[1] : (22.5 + (Math.random()-0.5)*2),
        lng: v.location?.coordinates ? v.location.coordinates[0] : (80.5 + (Math.random()-0.5)*2),
        skills: v.skills?.join(' · ') || 'General',
        status: v.status || 'offline',
        tasks: v.completedTasks || 0
      }));
    }
    
  } catch(e) {
    console.error(e);
  }

  renderAllMarkers();
  renderList();
  updateStats();
  
  if (window.SahayaSetu.SocketClient) {
    window.SahayaSetu.SocketClient.emit('join:coordinator');
  }
});

function timeAgo(d) {
  if (!d) return 'just now';
  const s = Math.floor((Date.now()-new Date(d))/1000);
  if(s<60)  return s+'s ago';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

/* Fix: Force Leaflet to recalculate map size after full page render */
setTimeout(() => map.invalidateSize(), 100);
</script>
</body>
